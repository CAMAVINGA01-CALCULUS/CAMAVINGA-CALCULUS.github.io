<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.E.G.A Striker AI</title>
    <style>
        body {
            margin: 0;
            background: #0a0a14;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 2px;
        }
        #scoreboard {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #playerScore { color: #00ff66; }
        #aiScore { color: #ff0055; }
        canvas {
            background: #111122;
            border: 4px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            max-width: 100%;
            touch-action: none;
        }
        p {
            color: #666688;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h1>T.E.G.A STRIKER</h1>
    <div id="scoreboard">
        <span id="playerScore">0</span> : <span id="aiScore">0</span>
    </div>
    
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <p>Use your Mouse or Drag on Mobile to control your Glowing Mallet!</p>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    const pScoreEl = document.getElementById("playerScore");
    const aiScoreEl = document.getElementById("aiScore");

    let playerScore = 0;
    let aiScore = 0;
    let gameOver = false;
    let winScore = 7;

    // Ball/Puck
    const puck = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 12,
        vx: 0,
        vy: 5,
        speed: 5,
        color: "#ffffff"
    };

    // User Mallet (Bottom)
    const player = {
        x: canvas.width / 2,
        y: canvas.height - 60,
        radius: 25,
        color: "#00ff66"
    };

    // AI Mallet (Top)
    const ai = {
        x: canvas.width / 2,
        y: 60,
        radius: 25,
        color: "#ff0055",
        speed: 3.5 // AI speed difficulty
    };

    // Track touch/mouse movements
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        // Scale appropriately to matching canvas resolution
        let targetX = (clientX - rect.left) * (canvas.width / rect.width);
        let targetY = (clientY - rect.top) * (canvas.height / rect.height);
        
        // Restrict player to their half of the table
        if (targetY < canvas.height / 2 + player.radius) {
            targetY = canvas.height / 2 + player.radius;
        }
        
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, targetX));
        player.y = Math.max(canvas.height / 2, Math.min(canvas.height - player.radius, targetY));
    }

    canvas.addEventListener("mousemove", getMousePos);
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        getMousePos(e);
    }, { passive: false });

    canvas.addEventListener("click", () => {
        if (gameOver) resetMatch();
    });

    function resetPuck(direction) {
        puck.x = canvas.width / 2;
        puck.y = canvas.height / 2;
        puck.vx = (Math.random() - 0.5) * 4;
        puck.vy = direction * 5;
    }

    function resetMatch() {
        playerScore = 0;
        aiScore = 0;
        pScoreEl.innerText = 0;
        aiScoreEl.innerText = 0;
        gameOver = false;
        resetPuck(1);
        animate();
    }

    function drawCircle(x, y, r, color, glowColor) {
        ctx.shadowBlur = glowColor ? 15 : 0;
        ctx.shadowColor = glowColor || "transparent";
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; // reset
    }

    function animate() {
        if (gameOver) {
            ctx.fillStyle = "rgba(10,10,20,0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffff";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            let msg = playerScore >= winScore ? "YOU WIN!" : "AI WINS!";
            ctx.fillText(msg, canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = "#fff";
            ctx.font = "18px Arial";
            ctx.fillText("Click anywhere to replay", canvas.width / 2, canvas.height / 2 + 30);
            return;
        }

        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- DRAW pitch lines ---
        ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
        ctx.lineWidth = 4;
        // Center Line
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
        // Center Circle
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2);
        ctx.stroke();

        // Goals
        ctx.strokeStyle = "#00ffff";
        ctx.strokeRect(canvas.width / 2 - 50, 0, 100, 10);
        ctx.strokeRect(canvas.width / 2 - 50, canvas.height - 10, 100, 10);

        // --- AI LOGIC ---
        // Simple AI tracking movement towards puck
        let targetX = puck.x;
        ai.x += (targetX - ai.x) * 0.15;
        // Keep AI inside bounds
        if (ai.x < ai.radius) ai.x = ai.radius;
        if (ai.x > canvas.width - ai.radius) ai.x = canvas.width - ai.radius;

        // --- PHYSICS & BALL MOVEMENT ---
        puck.x += puck.vx;
        puck.y += puck.vy;

        // Wall bounces (X-axis)
        if (puck.x - puck.radius < 0 || puck.x + puck.radius > canvas.width) {
            puck.vx = -puck.vx;
            puck.x = puck.x - puck.radius < 0 ? puck.radius : canvas.width - puck.radius;
        }

        // Top/Bottom Goal checks or Wall bounces
        if (puck.y - puck.radius < 0) {
            // Check Player Goal score
            if (puck.x > canvas.width / 2 - 50 && puck.x < canvas.width / 2 + 50) {
                playerScore++;
                pScoreEl.innerText = playerScore;
                if (playerScore >= winScore) gameOver = true;
                else resetPuck(1);
            } else {
                puck.vy = -puck.vy;
                puck.y = puck.radius;
            }
        } else if (puck.y + puck.radius > canvas.height) {
            // Check AI Goal score
            if (puck.x > canvas.width / 2 - 50 && puck.x < canvas.width / 2 + 50) {
                aiScore++;
                aiScoreEl.innerText = aiScore;
                if (aiScore >= winScore) gameOver = true;
                else resetPuck(-1);
            } else {
                puck.vy = -puck.vy;
                puck.y = canvas.height - puck.radius;
            }
        }

        // Collision Check Helper
        function checkCollision(paddle) {
            let dx = puck.x - paddle.x;
            let dy = puck.y - paddle.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < puck.radius + paddle.radius) {
                // Elastic collision response math
                let angle = Math.atan2(dy, dx);
                let speed = Math.sqrt(puck.vx * puck.vx + puck.vy * puck.vy) + 0.5; // Slight speed up on hit
                speed = Math.min(speed, 12); // Speed cap
                
                puck.vx = Math.cos(angle) * speed;
                puck.vy = Math.sin(angle) * speed;
            }
        }

        checkCollision(player);
        checkCollision(ai);

        // --- RENDER ENTITIES WITH GLOW EFFECTS ---
        drawCircle(puck.x, puck.y, puck.radius, puck.color, "#ffffff");
        drawCircle(player.x, player.y, player.radius, player.color, "#00ff66");
        drawCircle(ai.x, ai.y, ai.radius, ai.color, "#ff0055");
    }

    // Initialize game
    resetPuck(1);
    animate();
</script>

</body>
</html>
