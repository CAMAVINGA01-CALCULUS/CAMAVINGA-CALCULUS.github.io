<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>T.E.G.A Neon Overdrive</title>
    <style>
        body {
            margin: 0;
            background: #0d0d1a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            margin: 5px 0;
            color: #ff007f;
            text-shadow: 0 0 12px #ff007f;
            font-size: 26px;
            letter-spacing: 3px;
        }
        #hud {
            display: flex;
            gap: 40px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #score span { color: #00ffcc; }
        #speed span { color: #ffff00; }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
        }
        canvas {
            background: #111122;
            border: 3px solid #ff007f;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.25);
            display: block;
            width: 100%;
            touch-action: none;
        }
        .instruction {
            color: #666688;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>T.E.G.A OVERDRIVE</h1>
    <div id="hud">
        <div id="score">Score: <span>0</span></div>
        <div id="speed">Speed: <span>0</span> MPH</div>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="450" height="650"></canvas>
    </div>
    
    <div class="instruction">PC: Use **A / D** or **Arrow Keys** | Mobile: **Drag/Swipe anywhere** on the screen!</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreVal = document.querySelector("#score span");
    const speedVal = document.querySelector("#speed span");

    let score = 0;
    let distance = 0;
    let gameOver = false;
    let gameSpeed = 8;
    const maxGameSpeed = 22;

    const player = {
        x: canvas.width / 2,
        y: canvas.height - 120,
        width: 36,
        height: 65,
        targetX: canvas.width / 2,
        speed: 0.2, 
        color: "#00ffcc"
    };

    let traffic = [];
    let particles = [];
    const roadWidth = 340;
    const roadLeft = (canvas.width - roadWidth) / 2;

    let keys = { Left: false, Right: false };
    
    window.addEventListener("keydown", e => {
        if (e.key === "ArrowLeft" || e.key === "a") keys.Left = true;
        if (e.key === "ArrowRight" || e.key === "d") keys.Right = true;
        if (gameOver && (e.key === " " || e.key === "Enter")) resetGame();
    });
    
    window.addEventListener("keyup", e => {
        if (e.key === "ArrowLeft" || e.key === "a") keys.Left = false;
        if (e.key === "ArrowRight" || e.key === "d") keys.Right = false;
    });

    function handleMove(e) {
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let relativeX = (clientX - rect.left) * (canvas.width / rect.width);
        player.targetX = Math.max(roadLeft + player.width/2, Math.min(roadLeft + roadWidth - player.width/2, relativeX));
    }

    canvas.addEventListener("mousemove", (e) => { if(e.buttons === 1) handleMove(e); });
    canvas.addEventListener("touchmove", (e) => { e.preventDefault(); handleMove(e); }, { passive: false });
    canvas.addEventListener("pointerdown", () => { if(gameOver) resetGame(); });

    function spawnTraffic() {
        const lanes = [roadLeft + 45, roadLeft + 130, roadLeft + 215, roadLeft + 300];
        let randomLane = lanes[Math.floor(Math.random() * lanes.length)];
        
        if (traffic.length > 0 && traffic[traffic.length - 1].y < 180) return;

        const colors = ["#ff0055", "#ffff00", "#ff7700", "#b500ff"];
        traffic.push({
            x: randomLane,
            y: -100,
            width: 36,
            height: 65,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: Math.random() * 2 + 2
        });
    }

    function createExplosion(x, y) {
        for(let i=0; i<25; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                radius: Math.random() * 4 + 2,
                alpha: 1,
                color: Math.random() > 0.5 ? "#00ffcc" : "#ff0055"
            });
        }
    }

    function resetGame() {
        traffic = [];
        particles = [];
        score = 0;
        distance = 0;
        gameSpeed = 8;
        player.x = canvas.width / 2;
        player.targetX = canvas.width / 2;
        gameOver = false;
        animate();
    }

    function drawNeonCar(x, y, width, height, glowColor) {
        ctx.shadowBlur = 12;
        ctx.shadowColor = glowColor;
        
        ctx.fillStyle = glowColor;
        ctx.fillRect(x - width/2, y - height/2, width, height);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#090911";
        ctx.fillRect(x - width/2.6, y - height/6, width * 0.76, height * 0.28);
        
        ctx.fillStyle = "#fff";
        ctx.fillRect(x - width/1.8, y - height/2.5, 4, 12);
        ctx.fillRect(x + width/2.2, y - height/2.5, 4, 12);
        ctx.fillRect(x - width/1.8, y + height/4, 4, 12);
        ctx.fillRect(x + width/2.2, y + height/4, 4, 12);
    }

    function animate() {
        if (gameOver) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(13, 13, 26, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f";
            ctx.font = "bold 36px Arial";
            ctx.textAlign = "center";
            ctx.fillText("SYSTEM CRASH", canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = "#fff";
            ctx.font = "18px Arial";
            ctx.fillText("Tap screen or hit Space to reboot", canvas.width / 2, canvas.height / 2 + 25);
            return;
        }

        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#15152a"; 
        ctx.fillRect(roadLeft, 0, roadWidth, canvas.height);

        ctx.strokeStyle = "#ff007f";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(roadLeft, 0); ctx.lineTo(roadLeft, canvas.height);
        ctx.moveTo(roadLeft + roadWidth, 0); ctx.lineTo(roadLeft + roadWidth, canvas.height);
        ctx.stroke();

        distance += gameSpeed;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
        ctx.lineWidth = 3;
        ctx.setLineDash([30, 40]);
        ctx.lineDashOffset = -distance;

        for (let i = 1; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(roadLeft + (roadWidth / 4) * i, 0);
            ctx.lineTo(roadLeft + (roadWidth / 4) * i, canvas.height);
            ctx.stroke();
        }
        ctx.setLineDash([]); 

        if (keys.Left) player.targetX -= 8;
        if (keys.Right) player.targetX += 8;

        player.targetX = Math.max(roadLeft + player.width/2, Math.min(roadLeft + roadWidth - player.width/2, player.targetX));
        player.x += (player.targetX - player.x) * player.speed;

        drawNeonCar(player.x, player.y, player.width, player.height, player.color);

        if (Math.random() < 0.02) spawnTraffic();

        for (let i = traffic.length - 1; i >= 0; i--) {
            let car = traffic[i];
            car.y += gameSpeed - car.speed;
            
            drawNeonCar(car.x, car.y, car.width, car.height, car.color);

            if (
                player.x - player.width/2 < car.x + car.width/2 &&
                player.x + player.width/2 > car.x - car.width/2 &&
                player.y - player.height/2 < car.y + car.height/2 &&
                player.y + player.height/2 > car.y - car.height/2
            ) {
                createExplosion(player.x, player.y);
                gameOver = true;
            }

            if (car.y > canvas.height + 100) {
                traffic.splice(i, 1);
                score += 10;
            }
        }

        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.02;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            if (p.alpha <= 0) particles.splice(index, 1);
        });
        ctx.globalAlpha = 1.0; 

        if (score > 0 && score % 100 === 0 && gameSpeed < maxGameSpeed) {
            gameSpeed += 0.02; 
        }

        scoreVal.innerText = score;
        speedVal.innerText = Math.floor(gameSpeed * 6);
    }

    resetGame();
</script>

</body>
</html>
